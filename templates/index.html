<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PromptCraft - AI 提示词工坊</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22262f;
    --border: #2a2e3a;
    --text: #e4e6ed;
    --text2: #9ca0b0;
    --accent: #7c6ff7;
    --accent-hover: #9589f9;
    --success: #34d399;
    --warning: #fbbf24;
    --radius: 12px;
    --transition: 0.2s ease;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.6;
  }

  .container { max-width: 960px; margin: 0 auto; padding: 32px 20px; }

  header {
    text-align: center;
    margin-bottom: 32px;
  }
  header h1 {
    font-size: 28px;
    font-weight: 700;
    background: linear-gradient(135deg, var(--accent), #f472b6);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  header p { color: var(--text2); margin-top: 6px; font-size: 14px; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    margin-bottom: 20px;
  }

  .card-title {
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card-title .icon { font-size: 18px; }

  textarea {
    width: 100%;
    min-height: 120px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    padding: 14px;
    font-size: 14px;
    font-family: inherit;
    resize: vertical;
    transition: border-color var(--transition);
  }
  textarea:focus { outline: none; border-color: var(--accent); }
  textarea::placeholder { color: #555; }

  .style-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 14px;
  }
  .style-tag {
    padding: 7px 16px;
    border: 1px solid var(--border);
    border-radius: 20px;
    cursor: pointer;
    font-size: 13px;
    color: var(--text2);
    background: var(--surface2);
    transition: all var(--transition);
    user-select: none;
  }
  .style-tag:hover { border-color: var(--accent); color: var(--text); }
  .style-tag.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 10px 22px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    border: none;
    cursor: pointer;
    transition: all var(--transition);
    font-family: inherit;
  }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover:not(:disabled) { background: var(--accent-hover); }

  .btn-outline {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
  }
  .btn-outline:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }

  .btn-sm { padding: 6px 14px; font-size: 12px; }

  .actions {
    display: flex;
    gap: 10px;
    margin-top: 18px;
    flex-wrap: wrap;
  }

  .result-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }
  @media (max-width: 700px) { .result-grid { grid-template-columns: 1fr; } }

  .result-box {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 18px;
    min-height: 200px;
    position: relative;
    white-space: pre-wrap;
    font-size: 14px;
    line-height: 1.7;
  }
  .result-box:empty::after {
    content: "等待生成...";
    color: #444;
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
  }

  .result-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }
  .result-header span { font-size: 13px; color: var(--text2); font-weight: 500; }

  .spinner {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-overlay {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    color: var(--text2);
    font-size: 13px;
    padding: 40px 0;
  }

  .toast {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--success);
    color: #000;
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    z-index: 1000;
    opacity: 0;
    transition: opacity 0.3s ease;
    pointer-events: none;
  }
  .toast.show { opacity: 1; }

  .error { color: #f87171; font-size: 13px; margin-top: 8px; }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>PromptCraft</h1>
    <p>输入你的需求，AI 帮你生成高质量提示词</p>
  </header>

  <!-- Input Card -->
  <div class="card">
    <div class="card-title"><span class="icon">📝</span> 你的需求</div>
    <textarea id="userInput" placeholder="例如：写一篇小红书爆款口红测评文案，目标受众是大学生..."></textarea>

    <div class="style-tags" id="styleTags"></div>

    <div class="actions">
      <button class="btn btn-primary" id="btnOptimize" onclick="doOptimize()">
        ✨ 优化提示词
      </button>
      <button class="btn btn-outline" id="btnGenerate" onclick="doGenerate()" disabled>
        📄 生成示例输出
      </button>
    </div>
    <div id="inputError" class="error" style="display:none"></div>
  </div>

  <!-- Results -->
  <div class="result-grid">
    <!-- Optimized Prompt -->
    <div class="card">
      <div class="result-header">
        <span>🎯 优化后的提示词</span>
        <div>
          <button class="btn btn-outline btn-sm" onclick="copyText('resultPrompt')">📋 复制</button>
          <button class="btn btn-outline btn-sm" onclick="downloadText('prompt')">⬇ 下载</button>
        </div>
      </div>
      <div id="resultPromptArea">
        <div class="result-box" id="resultPrompt"></div>
      </div>
    </div>

    <!-- Example Output -->
    <div class="card">
      <div class="result-header">
        <span>📖 示例输出</span>
        <div>
          <button class="btn btn-outline btn-sm" onclick="copyText('resultExample')">📋 复制</button>
          <button class="btn btn-outline btn-sm" onclick="downloadText('example')">⬇ 下载</button>
        </div>
      </div>
      <div id="resultExampleArea">
        <div class="result-box" id="resultExample"></div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ---- State ----
const styles = [
  { id: "marketing", label: "📢 营销文案" },
  { id: "social", label: "📱 社交媒体" },
  { id: "academic", label: "📚 学术写作" },
  { id: "image", label: "🎨 图片生成" },
  { id: "code", label: "💻 代码辅助" },
  { id: "general", label: "🔄 通用优化" },
];
let selectedStyle = "general";
let currentPrompt = "";

// ---- Init ----
function init() {
  const container = document.getElementById("styleTags");
  styles.forEach(s => {
    const tag = document.createElement("span");
    tag.className = "style-tag" + (s.id === selectedStyle ? " active" : "");
    tag.textContent = s.label;
    tag.onclick = () => selectStyle(s.id);
    tag.dataset.id = s.id;
    container.appendChild(tag);
  });
}
init();

function selectStyle(id) {
  selectedStyle = id;
  document.querySelectorAll(".style-tag").forEach(t => t.classList.remove("active"));
  document.querySelector(`.style-tag[data-id="${id}"]`).classList.add("active");
}

// ---- Toast ----
function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 1800);
}

// ---- API calls ----
async function doOptimize() {
  const input = document.getElementById("userInput").value.trim();
  const errEl = document.getElementById("inputError");

  if (!input) {
    errEl.textContent = "请输入需求描述";
    errEl.style.display = "block";
    return;
  }
  errEl.style.display = "none";

  const btn = document.getElementById("btnOptimize");
  const resultArea = document.getElementById("resultPrompt");
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> 优化中...';
  resultArea.textContent = "";

  try {
    const r = await fetch("/api/optimize", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ input, style: selectedStyle }),
    });
    const data = await r.json();
    if (data.error) throw new Error(data.error);

    currentPrompt = data.prompt;
    resultArea.textContent = currentPrompt;
    document.getElementById("btnGenerate").disabled = false;
    btn.innerHTML = "✨ 优化提示词";
  } catch (e) {
    resultArea.textContent = "❌ " + e.message;
    btn.innerHTML = "✨ 优化提示词";
  }
  btn.disabled = false;
}

async function doGenerate() {
  if (!currentPrompt) return;

  const btn = document.getElementById("btnGenerate");
  const resultArea = document.getElementById("resultExample");
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> 生成中...';
  resultArea.textContent = "";

  try {
    const r = await fetch("/api/generate", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ prompt: currentPrompt, style: selectedStyle }),
    });
    const data = await r.json();
    if (data.error) throw new Error(data.error);

    resultArea.textContent = data.example;
    btn.innerHTML = "📄 生成示例输出";
  } catch (e) {
    resultArea.textContent = "❌ " + e.message;
    btn.innerHTML = "📄 生成示例输出";
  }
  btn.disabled = false;
}

// ---- Copy ----
function copyText(elementId) {
  const el = document.getElementById(elementId);
  const text = el.textContent.trim();
  if (!text) { showToast("暂无内容可复制"); return; }

  navigator.clipboard.writeText(text).then(() => showToast("已复制到剪贴板 ✓"));
}

// ---- Download ----
function downloadText(type) {
  let text, filename;
  if (type === "prompt") {
    text = currentPrompt;
    filename = "prompt.txt";
  } else {
    text = document.getElementById("resultExample").textContent.trim();
    filename = "example.txt";
  }
  if (!text) { showToast("暂无内容可下载"); return; }

  const blob = new Blob([text], { type: "text/plain;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  a.click();
  URL.revokeObjectURL(url);
  showToast("下载完成 ✓");
}
</script>
</body>
</html>
